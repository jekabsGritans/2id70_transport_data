services:
  db:
    image: postgres:15
    container_name: gtfs_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: gtfs_db
    ports:
      - "5433:5432"
    volumes:
      - ./IDFM-gtfs:/data/gtfs:ro
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql